# docker-compose.test.yml
# ─────────────────────────────────────────────────────────────────────────────
# Mediu de testare izolat pentru WMS NK.
# Lansează doar infrastructura necesară pentru rularea suitelor Jest
# (PostgreSQL + Redis). Nu pornește Kong, Grafana, Loki sau serviciile business.
#
# Utilizare:
#   docker-compose -f docker-compose.test.yml up -d
#   cd services/auth  && NODE_ENV=test npm test
#   cd services/inventory && NODE_ENV=test npm test
#   docker-compose -f docker-compose.test.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── PostgreSQL (test instance) ───────────────────────────────────────────────
  postgres-test:
    image: postgres:15-alpine
    container_name: wms-postgres-test
    environment:
      POSTGRES_USER: wms_admin
      POSTGRES_PASSWORD: wms_secure_pass_2025
      POSTGRES_DB: wms_nks_test
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432"   # offset port to avoid conflict with dev postgres
    volumes:
      - ./docker/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - wms-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms_admin -d wms_nks_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (test instance) ────────────────────────────────────────────────────
  redis-test:
    image: redis:7-alpine
    container_name: wms-redis-test
    command: redis-server --requirepass redis_pass_2025
    ports:
      - "6380:6379"   # offset port to avoid conflict with dev redis
    networks:
      - wms-test-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass_2025", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  wms-test-network:
    name: wms-test-network

# No persistent volumes — test data is ephemeral and removed on "down -v"
